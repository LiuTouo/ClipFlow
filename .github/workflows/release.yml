name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      # Fail fast on a mis-versioned tag: the tag must match the single
      # source of truth in src-tauri/Cargo.toml.
      - name: Tag matches Cargo.toml version
        shell: pwsh
        run: |
          $v = (Select-String -Path src-tauri/Cargo.toml -Pattern '^version = "([^"]+)"').Matches[0].Groups[1].Value
          if ("v$v" -ne "${{ github.ref_name }}") { throw "Tag ${{ github.ref_name }} != Cargo.toml v$v" }

      # tauri-action runs beforeBuildCommand (npm run build) + tauri build,
      # creates the GitHub release (tagName + releaseName are REQUIRED —
      # without them it only builds and uploads nothing), uploads the NSIS
      # setup exe, and — with the signing env vars present and
      # createUpdaterArtifacts on — also signs and uploads the updater
      # artifacts including latest.json.
      - uses: tauri-apps/tauri-action@v0
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "ClipFlow v__VERSION__"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      # The portable build is the same raw exe the NSIS bundle was made from.
      # Asset name convention: the About-page updater matches /portable/i + .exe.
      - name: Stage portable exe
        shell: pwsh
        run: Copy-Item "src-tauri/target/release/clipflow.exe" "ClipFlow_${{ github.ref_name }}_x64-portable.exe"

      # Portable downloads verify this minisign signature (same key as the
      # NSIS updater artifacts) before the new exe is written to disk.
      - name: Sign portable exe
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri signer sign "ClipFlow_${{ github.ref_name }}_x64-portable.exe"

      - name: Upload portable asset
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" "ClipFlow_${{ github.ref_name }}_x64-portable.exe" "ClipFlow_${{ github.ref_name }}_x64-portable.exe.sig" --clobber

      # tauri-action creates the release with the commit message as body.
      # Replace it with this version's CHANGELOG section (header line dropped —
      # the release page already shows version and date).
      - name: Set release notes from CHANGELOG
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ver = "${{ github.ref_name }}".TrimStart('v')
          $changelog = [System.IO.File]::ReadAllText("CHANGELOG.md", [System.Text.UTF8Encoding]::new($false))
          $m = [regex]::Match($changelog, "(?ms)^## \[$([regex]::Escape($ver))\].*?(?=^## \[|^\[\d|\z)")
          if (-not $m.Success) { throw "CHANGELOG.md has no section for $ver" }
          $notes = (($m.Value.Trim() -split "`r?`n") | Select-Object -Skip 1) -join "`n"
          [System.IO.File]::WriteAllText("release-notes.md", $notes, [System.Text.UTF8Encoding]::new($false))
          gh release edit "${{ github.ref_name }}" --notes-file release-notes.md
